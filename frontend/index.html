<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>涉水审批智能审核系统</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>
    <div id="app">
      <div class="app-shell app-fallback">
        <aside class="side-panel">
          <div>
            <p class="side-kicker">Course Project</p>
            <h1>涉水审批智能审核系统</h1>
            <p class="side-copy">
              节点一聚焦项目基础架构、页面交互与服务联通，为后续知识库、MCP 和 Agent
              能力预留清晰扩展接口。
            </p>
          </div>
          <nav class="nav-links">
            <a href="/">申请列表</a>
            <a href="/applications/new">新建申请</a>
            <a href="/review">初审结果</a>
          </nav>
        </aside>
        <main class="main-panel">
          <section>
            <div class="page-header">
              <div>
                <p class="page-kicker">Loading</p>

              </div>

              </p>
            </div>
            <div class="card">
              <p>当前可访问页面：</p>
              <div class="toolbar">
                <a class="primary-btn fallback-link" href="/">申请列表</a>
                <a class="secondary-btn fallback-link" href="/applications/new">新建申请</a>
                <a class="secondary-btn fallback-link" href="/review">初审结果</a>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
