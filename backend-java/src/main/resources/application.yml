server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./data/water_approval.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

app:
  upload-dir: ./uploads

python:
  ai:
    base-url: http://localhost:8001

